<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Otamatone Pro Smooth Canvas</title>
<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
canvas {
  background: #1e293b;
  border-radius: 20px;
  margin: 10px;
}
button {
  padding: 10px 14px;
  margin: 4px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}
.active { background: #22c55e; color: black; }
</style>
</head>
<body>

<canvas id="face" width="200" height="200"></canvas>
<canvas id="fretboard" width="300" height="100"></canvas>

<div>
  <button id="powerBtn">ON</button>
</div>

<div>
  <button onclick="setFreq(440)">440 Hz</button>
  <button onclick="setFreq(441)">441 Hz</button>
  <button onclick="setFreq(339)">339 Hz</button>
</div>

<div>
  <button onclick="adjustFreq(-1)">-</button>
  <button onclick="adjustFreq(1)">+</button>
</div>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc, gain, filter;
let isOn = false;
let mouthOpen = false;
let currentFreq = 440;

// SCALE
const scale = [
130.81,146.83,164.81,174.61,196.00,220.00,246.94,
261.63,293.66,329.63,349.23,392.00,440.00,493.88
];

// AUDIO
function startSound() {
  osc = ctx.createOscillator();
  gain = ctx.createGain();
  filter = ctx.createBiquadFilter();
  osc.type = "sawtooth";
  gain.gain.value = 0.15;
  filter.type = "lowpass";
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  setFrequency(currentFreq);
}

function stopSound() {
  if (osc) osc.stop();
  osc = gain = filter = null;
}

// FREQUENCY
function setFrequency(freq) {
  currentFreq = freq;
  if (!osc) return;
  osc.frequency.cancelScheduledValues(ctx.currentTime);
  osc.frequency.setTargetAtTime(freq, ctx.currentTime, 0.08);
}
function setFreq(freq) { setFrequency(freq); }
function adjustFreq(amount) { setFrequency(currentFreq + amount); }

// POWER
document.getElementById("powerBtn").onclick = () => {
  const btn = document.getElementById("powerBtn");
  if (!isOn) { startSound(); isOn = true; btn.classList.add("active"); }
  else { stopSound(); isOn = false; btn.classList.remove("active"); }
};

// FRETBOARD
const fretCanvas = document.getElementById("fretboard");
const fctx = fretCanvas.getContext("2d");
function drawFretboard(active = -1) {
  fctx.clearRect(0,0,300,100);
  let w = 300 / scale.length;
  scale.forEach((note,i)=>{
    fctx.fillStyle = (i===active) ? "#22c55e" : "#334155";
    fctx.fillRect(i*w,0,w-2,100);
  });
}
drawFretboard();

function playFromX(x) {
  const i = Math.floor((x/window.innerWidth)*scale.length);
  const idx = Math.max(0, Math.min(scale.length-1, i));
  setFrequency(scale[idx]);
  drawFretboard(idx);
}
window.addEventListener("mousemove", e=>{ if(isOn) playFromX(e.clientX); });
window.addEventListener("touchmove", e=>{ if(isOn) playFromX(e.touches[0].clientX); });

// CANVAS FACE
const faceCanvas = document.getElementById("face");
const faceCtx = faceCanvas.getContext("2d");
let mouthLevel = 0;
let mouthDirection = 1;

// DRAW FACE
function drawFace() {
  faceCtx.clearRect(0,0,200,200);
  // head
  faceCtx.fillStyle = "#FFD700";
  faceCtx.beginPath();
  faceCtx.ellipse(100,100,80,120,0,0,Math.PI*2);
  faceCtx.fill();
  // eyes
  faceCtx.fillStyle="#000";
  faceCtx.beginPath();
  faceCtx.ellipse(65,80,10,10,0,0,Math.PI*2);
  faceCtx.fill();
  faceCtx.beginPath();
  faceCtx.ellipse(135,80,10,10,0,0,Math.PI*2);
  faceCtx.fill();
  // mouth
  faceCtx.fillStyle="#000";
  let mouthHeight = 10 + mouthLevel*20; // 10 to 30px
  faceCtx.fillRect(70,150-mouthHeight/2,60,mouthHeight);
}
function animateMouth() {
  if(mouthOpen){
    mouthLevel += 0.1*mouthDirection;
    if(mouthLevel>1) mouthDirection=-1;
    if(mouthLevel<0) mouthDirection=1;
  } else {
    mouthLevel *=0.9; // smooth close
  }
  drawFace();
  requestAnimationFrame(animateMouth);
}
animateMouth();

// WAH FILTER
function updateFilter() {
  if(!filter) return;
  if(mouthOpen) filter.frequency.setTargetAtTime(2000,ctx.currentTime,0.05);
  else filter.frequency.setTargetAtTime(400,ctx.currentTime,0.05);
}

// SPACE = Wah
window.addEventListener("keydown", e=>{
  if(e.code==="Space"){ mouthOpen=true; updateFilter(); }
});
window.addEventListener("keyup", e=>{
  if(e.code==="Space"){ mouthOpen=false; updateFilter(); }
});
</script>

</body>
</html>
